name: CGSarkari WhatsApp Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '30 23 * * *' # 🌅 यह रोज़ सुबह 5:00 बजे (IST) चलाएगा
    - cron: '0 11 * * *'  # 🌇 यह रोज़ शाम 4:30 बजे (IST) चलाएगा

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libasound2t64 fonts-liberation libappindicator3-1 xdg-utils

      - name: Install Node Modules
        run: |
          npm install
          npm install qrcode whatsapp-web.js qrcode-terminal rss-parser axios puppeteer

      # 🚀 जादू यहाँ है: यह लॉगिन और भेजी गई पोस्ट (दोनों) को याद रखेगा
      - name: Cache WhatsApp Session & Sent Posts
        uses: actions/cache@v4
        with:
          path: |
            .wwebjs_auth
            sent_posts.json
          key: wa-session-${{ github.run_id }}
          restore-keys: |
            wa-session-
          save-always: true
      - name: Run Bot
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          timeout 300 node index.js || echo "Bot session completed or timed out"

      - name: Upload QR Code (Only if needed)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qr-code
          path: qr-code.png
          retention-days: 1
