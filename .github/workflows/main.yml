name: CGSarkari WhatsApp Bot

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libasound2t64 fonts-liberation libappindicator3-1 xdg-utils

      - name: Install Node Modules
        run: |
          npm install
          npm install qrcode whatsapp-web.js qrcode-terminal

      # 🚀 जादू यहाँ है: यह आपके लॉगिन को हमेशा के लिए याद रखेगा (Cache)
      - name: Cache WhatsApp Session
        uses: actions/cache@v4
        with:
          path: .wwebjs_auth
          key: wa-session-${{ github.run_id }}
          restore-keys: |
            wa-session-

      - name: Run Bot
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          timeout 300 node index.js || echo "Bot session completed or timed out"

      - name: Upload QR Code (Only if needed)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qr-code
          path: qr-code.png
          retention-days: 1
