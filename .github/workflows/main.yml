name: CGSarkari WhatsApp Bot

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # cache: npm  # ⚠️ अभी के लिए disable करें क्योंकि lock file नहीं है

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgbm-dev libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxrandr2 libgbm1 libasound2 \
            fonts-liberation libappindicator3-1 xdg-utils

      # ✅ npm install का इस्तेमाल करें (npmci की जगह)
      - name: Install Node Modules
        run: npm install

      # ✅ पुराना unzip हटाएं, artifact से restore करें
      - name: Restore WhatsApp Session
        uses: actions/download-artifact@v4
        with:
          name: whatsapp-session
          path: .wwebjs_auth/
        continue-on-error: true

      - name: Run Bot
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          timeout 240 node index.js || echo "Bot finished"

      - name: Save WhatsApp Session
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: whatsapp-session
          path: .wwebjs_auth/
          retention-days: 30
